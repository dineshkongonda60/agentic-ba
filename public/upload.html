<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Upload Process</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h2>Upload AS‑IS Process Document</h2>

    <form id="processForm">
      <label>Process Summary</label>
      <textarea name="process_summary" required></textarea>

      <label>Upload Document</label>
      <input type="file" name="process_file" />

      <button type="submit">Analyze</button>
    </form>

    <pre id="output"></pre>
  </div>

  <script src="app.js"></script>
</body>
</html>
