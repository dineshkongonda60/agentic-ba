<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Automation Suitability Agent</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1>Automation Suitability Agent</h1>

    <div class="grid">
      <div class="card">
        <label>Process Name</label>
        <input id="processName" />

        <label>Process Description</label>
        <textarea id="processDescription"></textarea>

        <label>Applications Involved</label>
        <div id="applicationsSelect" class="multi-select"></div>

        <label>OCR Required</label>
        <select id="ocrRequired">
          <option value="yes">Yes</option>
          <option value="no">No</option>
        </select>

        <label>Decision Nature</label>
        <select id="decisionNature">
          <option value="rule_based">Rule-based</option>
          <option value="mostly_rule_based">Mostly Rule-based</option>
          <option value="judgment_based">Judgment-based</option>
        </select>

        <label>Transaction Volume</label>
        <select id="volume">
          <option value="low">Low</option>
          <option value="medium">Medium</option>
          <option value="high">High</option>
        </select>

        <label>Number of Resources</label>
        <input type="number" id="resources" value="1"/>

        <label>Available Skills</label>
        <div id="skillsSelect" class="multi-select"></div>

        <button id="analyzeBtn">Analyze Process</button>
      </div>

      <div class="card results">
        <h3>Agent Recommendation</h3>
        <p><b>Primary Tool:</b> <span id="primaryTool"></span></p>
        <p><b>Secondary Tool:</b> <span id="secondaryTool"></span></p>
        <p><b>Timeline:</b> <span id="timeline"></span></p>
        <p><b>Required Skills:</b></p>
        <ul id="requiredSkills"></ul>
        <p><b>Justification:</b></p>
        <p id="comparison"></p>
      </div>
    </div>
  </div>

  <script src="multiselect.js"></script>
  <script src="app.js"></script>
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
